schema_version: 3
name: partial_sorting
status: complete
phase: Decide
title: Partial cell sorting
confidence: Accepted
question: 'Does violating the Young condition (large gamma_ld=7.5) stall sorting at a partially-sorted,
  trapped state?

  '
hypothesis: 'Light cells cannot fully surround dark; clusters trap heterotypic inclusions and never form
  a monolayer, sorting logarithmically slow.

  '
objective: 'Swap J_ll/J_ld so gamma_ld=7.5, simulate from a random IC to 2000 MCS, and compare against
  normal sorting to demonstrate incomplete sorting.

  '
description: 'Reproduction of the Fig 22+ example from Glazier & Graner (Phys. Rev. E 47, 2128, 1993).
  Exact parameters: J_ll=11, J_dd=2, J_ld=14, J_lM=16, J_dM=16 (gamma_ld=+7.5, gamma_lM=+10.5, gamma_dM=+15);
  T=5.0, lambda=1.0, target A_l=40.0, A_d=40.0. Initial condition: equilibrated_random. Figures reproduced:
  Fig 22, Fig 23, Fig 24.

  '
claim: 'Sorting stalls partial: no light monolayer forms and clusters trap inclusions, markedly slower
  than normal sorting (Figs 22-24).'
investigation: glazier-graner-1993
baseline:
- name: baseline
  composite: pbg_cpm_studies.composites.gg1993.partial_sorting
  params: {}
expected_behavior:
- No complete light monolayer forms by 2000 MCS
- Light-dark interface plateaus above the normal-sorting curve (Fig 24)
