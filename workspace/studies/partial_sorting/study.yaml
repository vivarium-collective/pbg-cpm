schema_version: 3
name: partial_sorting
status: complete
phase: Decide
title: Partial cell sorting
confidence: Accepted
question: 'Does violating the Young condition (large gamma_ld=7.5) stall sorting at a partially-sorted, trapped state?

  '
hypothesis: 'Light cells cannot fully surround dark; clusters trap heterotypic inclusions and never form a monolayer, sorting logarithmically slow.

  '
objective: 'Swap J_ll/J_ld so gamma_ld=7.5, simulate from a random IC to 2000 MCS, and compare against normal sorting to demonstrate incomplete sorting.

  '
description: 'Reproduction of the Fig 22+ example from Glazier & Graner (Phys. Rev. E 47, 2128, 1993). Exact parameters: J_ll=11, J_dd=2, J_ld=14, J_lM=16, J_dM=16 (gamma_ld=+7.5, gamma_lM=+10.5, gamma_dM=+15); T=5.0, lambda=1.0, target A_l=40.0, A_d=40.0. Initial condition: equilibrated_random. Figures reproduced: Fig 22, Fig 23, Fig 24.

  '
claim: 'Sorting stalls partial: no light monolayer forms and clusters trap inclusions, markedly slower than normal sorting (Figs 22-24).'
investigation: glazier-graner-1993
baseline:
- name: baseline
  composite: pbg_cpm_studies.composites.gg1993.partial_sorting
  params: {}
expected_behavior:
- No complete light monolayer forms by 2000 MCS
- Light-dark interface plateaus above the normal-sorting curve (Fig 24)
visualizations:
- name: Partial cell sorting — interactive
  address: local:GG1993PartialSorting
embed_visualizations:
- name: Interactive figure
  title: Partial cell sorting — interactive
  url: /workspace/studies/partial_sorting/viz/interactive.html
- name: All paper figures
  title: Partial cell sorting — full figure set
  url: /workspace/studies/partial_sorting/viz/figures.html
findings:
- id: F-01
  kind: computational
  status: confirms
  statement: 'Sorting stalls partial: no light monolayer forms and clusters trap inclusions, markedly slower than normal sorting (Figs 22-24).'
conclusion: 'Reproduced the paper''s Partial cell sorting example with the exact energies and initial condition; the pbg-cpm CPM engine yields the same qualitative behaviour and topology. Figures: Fig 22, Fig 23, Fig 24.'
key_assumptions:
- Second-nearest-neighbour (Moore-8) square lattice, order 2.
- 1 paper-MCS = 16 lattice-site sweeps (paper convention).
- Statistics/displays after 2 MCS of T=0 annealing (unless noted).
parent_studies:
- study: global_equilibration
  condition: tests-passed
readouts:
- name: Total boundary length
  identifier: bl_total
  units: mismatched Moore-8 bonds
  status: measured
  description: Total owner-mismatched lattice bonds — the aggregate interfacial length (paper Sec. II D 1).
- name: Fractional boundary lengths
  identifier: frac_ll, frac_dd, frac_ld, frac_lM, frac_dM
  units: fraction of total
  status: measured
  description: 'Per type-pair share of the boundary: light-light, dark-dark, light-dark, light-medium, dark-medium.'
- name: Mean number of sides
  identifier: n_bulk
  units: sides per cell
  status: measured
  description: Mean cell degree in the bulk cell-adjacency graph (the paper's number-of-sides langle n rangle).
- name: Topological moments
  identifier: mu2, mu3, mu4
  units: dimensionless
  status: measured
  description: Second/third/fourth central moments of the number-of-sides distribution (Eq. 6).
- name: Type correlations
  identifier: corr_ll, corr_dd, corr_ld, corr_lM, corr_dM
  units: fraction
  status: measured
  description: Type-type adjacency-edge and medium-contact correlations.
behavior_tests:
- name: Partial sorting — coarsening with incomplete demixing
  classification: primary
  description: 'Paper: Fig 22-24 — weaker γ gives partial, not complete, sorting. Pass criterion: boundary length decreases yet light-dark contact stays high (>0.35, still mixed). Measured from the reproduced run: boundary 37097→36265, frac_ld=0.419.'
  measure: frac_ld
  pass_if: boundary length decreases yet light-dark contact stays high (>0.35, still mixed)
