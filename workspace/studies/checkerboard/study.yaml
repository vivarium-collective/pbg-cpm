  kind: computational
  status: confirms
  statement: gamma_ld<0 yields a defect-ridden checkerboard with dominant light-dark contact and two transitions (~T=0 freeze, ~T=15 mixing), matching Figs 7-9 and Table I.
conclusion: 'Reproduced the paper''s Checkerboard (negative surface tension) example with the exact energies and initial condition; the pbg-cpm CPM engine yields the same qualitative behaviour and topology. Figures: Fig 7, Fig 8, Fig 9, Table I.'
key_assumptions:
- Second-nearest-neighbour (Moore-8) square lattice, order 2.
- 1 paper-MCS = 16 lattice-site sweeps (paper convention).
- Statistics/displays after 2 MCS of T=0 annealing (unless noted).
