- name: baseline
  composite: pbg_cpm_studies.composites.gg1993.checkerboard
  params: {}
expected_behavior:
- Light-dark heterotypic fraction is the largest cell-cell contact term
- Total boundary length decreases monotonically (Fig 8a)
