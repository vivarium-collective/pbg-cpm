schema_version: 3
name: position_reversal
status: complete
phase: Decide
title: Position reversal
confidence: Accepted
question: 'Does raising the light-Medium tension (gamma_lM=23) reverse the sorting so dark cells end up
  outside?

  '
hypothesis: 'With gamma_lM >> gamma_dM the dark cells present the lower medium tension and form the outer
  layer, giving a reversed pattern.

  '
objective: 'Simulate with gamma_lM=23 from a random IC and measure medium type-correlations to detect
  position reversal.

  '
description: 'Reproduction of the Fig 20+ example from Glazier & Graner (Phys. Rev. E 47, 2128, 1993).
  Exact parameters: J_ll=14, J_dd=2, J_ld=11, J_lM=30, J_dM=16 (gamma_ld=+3, gamma_lM=+23, gamma_dM=+15);
  T=10.0, lambda=1.0, target A_l=40.0, A_d=40.0. Initial condition: equilibrated_random. Figures reproduced:
  Fig 20, Fig 21.

  '
claim: Dark cells sort OUTWARD, surrounding the light cells, the reversed pattern predicted for gamma_lM>gamma_dM
  (Figs 20-21).
investigation: glazier-graner-1993
baseline:
- name: baseline
  composite: pbg_cpm_studies.composites.gg1993.position_reversal
  params: {}
expected_behavior:
- Dark-medium correlation rises above light-medium (outer dark layer)
- Light cells become internalized relative to dark
visualizations:
- name: Fig 20
  config:
    gallery: viz/figures.html
- name: Fig 21
  config:
    gallery: viz/figures.html
embed_visualizations:
- name: Reproduced figures
  title: Position reversal — reproduced figures
  url: /workspace/studies/position_reversal/viz/figures.html
findings:
- id: F-01
  kind: computational
  status: confirms
  statement: Dark cells sort OUTWARD, surrounding the light cells, the reversed pattern predicted for
    gamma_lM>gamma_dM (Figs 20-21).
conclusion: 'Reproduced the paper''s Position reversal example with the exact energies and initial condition;
  the pbg-cpm CPM engine yields the same qualitative behaviour and topology. Figures: Fig 20, Fig 21.'
key_assumptions:
- Second-nearest-neighbour (Moore-8) square lattice, order 2.
- 1 paper-MCS = 16 lattice-site sweeps (paper convention).
- Statistics/displays after 2 MCS of T=0 annealing (unless noted).
