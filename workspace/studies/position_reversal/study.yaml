schema_version: 3
name: position_reversal
status: complete
phase: Decide
title: Position reversal
confidence: Accepted
question: 'Does raising the light-Medium tension (gamma_lM=23) reverse the sorting so dark cells end up outside?

  '
hypothesis: 'With gamma_lM >> gamma_dM the dark cells present the lower medium tension and form the outer layer, giving a reversed pattern.

  '
objective: 'Simulate with gamma_lM=23 from a random IC and measure medium type-correlations to detect position reversal.

  '
description: 'Reproduction of the Fig 20+ example from Glazier & Graner (Phys. Rev. E 47, 2128, 1993). Exact parameters: J_ll=14, J_dd=2, J_ld=11, J_lM=30, J_dM=16 (gamma_ld=+3, gamma_lM=+23, gamma_dM=+15); T=10.0, lambda=1.0, target A_l=40.0, A_d=40.0. Initial condition: equilibrated_random. Figures reproduced: Fig 20, Fig 21.

  '
claim: Dark cells sort OUTWARD, surrounding the light cells, the reversed pattern predicted for gamma_lM>gamma_dM (Figs 20-21).
investigation: glazier-graner-1993
baseline:
- name: baseline
  composite: pbg_cpm_studies.composites.gg1993.position_reversal
  params: {}
expected_behavior:
- Dark-medium correlation rises above light-medium (outer dark layer)
- Light cells become internalized relative to dark
visualizations:
- name: Position reversal — interactive
  address: local:GG1993PositionReversal
embed_visualizations:
- name: Interactive figure
  title: Position reversal — interactive
  url: /workspace/studies/position_reversal/viz/interactive.html
- name: All paper figures
  title: Position reversal — full figure set
  url: /workspace/studies/position_reversal/viz/figures.html
findings:
- id: F-01
  kind: computational
  status: confirms
  statement: Dark cells sort OUTWARD, surrounding the light cells, the reversed pattern predicted for gamma_lM>gamma_dM (Figs 20-21).
conclusion: 'Reproduced the paper''s Position reversal example with the exact energies and initial condition; the pbg-cpm CPM engine yields the same qualitative behaviour and topology. Figures: Fig 20, Fig 21.'
key_assumptions:
- Second-nearest-neighbour (Moore-8) square lattice, order 2.
- 1 paper-MCS = 16 lattice-site sweeps (paper convention).
- Statistics/displays after 2 MCS of T=0 annealing (unless noted).
parent_studies:
- study: global_equilibration
  condition: tests-passed
readouts:
- name: Total boundary length
  identifier: bl_total
  units: mismatched Moore-8 bonds
  status: measured
  description: Total owner-mismatched lattice bonds — the aggregate interfacial length (paper Sec. II D 1).
- name: Fractional boundary lengths
  identifier: frac_ll, frac_dd, frac_ld, frac_lM, frac_dM
  units: fraction of total
  status: measured
  description: 'Per type-pair share of the boundary: light-light, dark-dark, light-dark, light-medium, dark-medium.'
- name: Mean number of sides
  identifier: n_bulk
  units: sides per cell
  status: measured
  description: Mean cell degree in the bulk cell-adjacency graph (the paper's number-of-sides langle n rangle).
- name: Topological moments
  identifier: mu2, mu3, mu4
  units: dimensionless
  status: measured
  description: Second/third/fourth central moments of the number-of-sides distribution (Eq. 6).
- name: Type correlations
  identifier: corr_ll, corr_dd, corr_ld, corr_lM, corr_dM
  units: fraction
  status: measured
  description: Type-type adjacency-edge and medium-contact correlations.
behavior_tests:
- name: 'Position reversal: dark forms the outer monolayer'
  classification: primary
  description: 'Paper: Fig 20-21 — light-Medium correlation→0; dark owns the surface. Pass criterion: dark holds >80% of the medium surface (light-Medium→0) AND light-dark contact falls (sorting). Measured from the reproduced run: corr_dM_final=1.000 (corr_lM 0.442→0.000), frac_ld 0.439→0.058.'
  measure: corr_dM
  pass_if: dark holds >80% of the medium surface (light-Medium→0) AND light-dark contact falls (sorting)
  status: passed
  result: PASS
  paper_reference: Fig 20-21 — light-Medium correlation→0; dark owns the surface
gate_status: passed
