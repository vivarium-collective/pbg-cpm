- name: baseline
  composite: pbg_cpm_studies.composites.gg1993.annealing
  params: {}
expected_behavior:
- Bulk <n> reaches within 0.5% of its plateau by 2 MCS of T=0 annealing
- Total <n> stays below bulk <n> at all times (Fig 2a ordering)
