schema_version: 3
name: annealing
status: complete
phase: Decide
title: Annealing convergence
confidence: Accepted
question: 'Does the pattern''s topology (<n>, moments) converge within a few MCS of T=0 annealing, as in Glazier-Graner Fig 2-3?

  '
hypothesis: 'Two MCS of T=0 annealing removes crumpling and disconnected spins, bringing bulk <n> within ~0.2% of its ~6.0 limit.

  '
objective: 'Anneal the equilibrated all-light pattern at T=0 and measure bulk/total <n> and moments mu2-4 vs MCS to determine convergence speed.

  '
description: 'Reproduction of the Fig 2+ example from Glazier & Graner (Phys. Rev. E 47, 2128, 1993). Exact parameters: J_ll=2, J_dd=2, J_ld=2, J_lM=8, J_dM=8 (gamma_ld=+0, gamma_lM=+7, gamma_dM=+7); T=0.0, lambda=1.0, target A_l=40.0, A_d=40.0. Initial condition: equilibrated_light. Figures reproduced: Fig 2, Fig 3.

  '
claim: Bulk <n> converges to ~5.97 within ~2 MCS with total<bulk, reproducing Fig 2; cell walls compact by 2-20 MCS (Fig 3).
investigation: glazier-graner-1993
baseline:
- name: baseline
  composite: pbg_cpm_studies.composites.gg1993.annealing
  params: {}
expected_behavior:
- Bulk <n> reaches within 0.5% of its plateau by 2 MCS of T=0 annealing
- Total <n> stays below bulk <n> at all times (Fig 2a ordering)
visualizations:
- name: Annealing — interactive
  address: local:GG1993Annealing
embed_visualizations:
- name: Interactive figure
  title: Annealing — interactive
  url: /workspace/studies/annealing/viz/interactive.html
- name: All paper figures
  title: Annealing — full figure set
  url: /workspace/studies/annealing/viz/figures.html
findings:
- id: F-01
  kind: computational
  status: confirms
  statement: Bulk <n> converges to ~5.97 within ~2 MCS with total<bulk, reproducing Fig 2; cell walls compact by 2-20 MCS (Fig 3).
conclusion: 'Reproduced the paper''s Annealing convergence example with the exact energies and initial condition; the pbg-cpm CPM engine yields the same qualitative behaviour and topology. Figures: Fig 2, Fig 3.'
key_assumptions:
- Second-nearest-neighbour (Moore-8) square lattice, order 2.
- 1 paper-MCS = 16 lattice-site sweeps (paper convention).
- Statistics/displays after 2 MCS of T=0 annealing (unless noted).
readouts:
- name: Total boundary length
  identifier: bl_total
  units: mismatched Moore-8 bonds
  status: measured
  description: Total owner-mismatched lattice bonds — the aggregate interfacial length (paper Sec. II D 1).
- name: Fractional boundary lengths
  identifier: frac_ll, frac_dd, frac_ld, frac_lM, frac_dM
  units: fraction of total
  status: measured
  description: 'Per type-pair share of the boundary: light-light, dark-dark, light-dark, light-medium, dark-medium.'
- name: Mean number of sides
  identifier: n_bulk
  units: sides per cell
  status: measured
  description: Mean cell degree in the bulk cell-adjacency graph (the paper's number-of-sides langle n rangle).
- name: Topological moments
  identifier: mu2, mu3, mu4
  units: dimensionless
  status: measured
  description: Second/third/fourth central moments of the number-of-sides distribution (Eq. 6).
- name: Type correlations
  identifier: corr_ll, corr_dd, corr_ld, corr_lM, corr_dM
  units: fraction
  status: measured
  description: Type-type adjacency-edge and medium-contact correlations.
behavior_tests:
- name: Topological equilibrium under T=0 annealing
  classification: primary
  description: 'Paper: Fig 2 / Sec. II D 2 — bulk ⟨n⟩→6, moments settle. Pass criterion: final ⟨n⟩_bulk ≈ 6 (within 0.3) and μ₂ decreases while annealing. Measured from the reproduced run: ⟨n⟩_bulk 6.23→6.00, μ₂ 0.748→0.463.'
  measure: n_bulk
  pass_if: final ⟨n⟩_bulk ≈ 6 (within 0.3) and μ₂ decreases while annealing
  status: passed
  result: PASS
  paper_reference: Fig 2 / Sec. II D 2 — bulk ⟨n⟩→6, moments settle
