schema_version: 3
name: annealing
status: complete
phase: Decide
title: Annealing convergence
confidence: Accepted
question: 'Does the pattern''s topology (<n>, moments) converge within a few MCS of T=0 annealing, as
  in Glazier-Graner Fig 2-3?

  '
hypothesis: 'Two MCS of T=0 annealing removes crumpling and disconnected spins, bringing bulk <n> within
  ~0.2% of its ~6.0 limit.

  '
objective: 'Anneal the equilibrated all-light pattern at T=0 and measure bulk/total <n> and moments mu2-4
  vs MCS to determine convergence speed.

  '
description: 'Reproduction of the Fig 2+ example from Glazier & Graner (Phys. Rev. E 47, 2128, 1993).
  Exact parameters: J_ll=2, J_dd=2, J_ld=2, J_lM=8, J_dM=8 (gamma_ld=+0, gamma_lM=+7, gamma_dM=+7); T=0.0,
  lambda=1.0, target A_l=40.0, A_d=40.0. Initial condition: equilibrated_light. Figures reproduced: Fig
  2, Fig 3.

  '
claim: Bulk <n> converges to ~5.97 within ~2 MCS with total<bulk, reproducing Fig 2; cell walls compact
  by 2-20 MCS (Fig 3).
investigation: glazier-graner-1993
