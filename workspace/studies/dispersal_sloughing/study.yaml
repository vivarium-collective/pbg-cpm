findings:
- id: F-01
  kind: computational
  status: confirms
  statement: Light cells disperse as isolated cells into the medium while dark cells remain compact and round (Fig 25).
conclusion: 'Reproduced the paper''s Dispersal - light-cell sloughing example with the exact energies and initial condition; the pbg-cpm CPM engine yields the same qualitative behaviour and topology. Figures: Fig 25.'
key_assumptions:
- Second-nearest-neighbour (Moore-8) square lattice, order 2.
- 1 paper-MCS = 16 lattice-site sweeps (paper convention).
- Statistics/displays after 2 MCS of T=0 annealing (unless noted).
parent_studies:
