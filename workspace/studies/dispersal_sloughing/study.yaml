behavior_tests:
- name: Light cells slough off and disperse into the medium
  classification: primary
  description: 'Paper: Fig 25 — light dissociates; light-medium interface surges. Pass criterion: light-medium fraction rises ≥3× and total boundary length increases (fragmentation). Measured from the reproduced run: frac_lM 0.073→0.513 (7.0×), boundary 39617→51795.'
  measure: frac_lM
  pass_if: light-medium fraction rises ≥3× and total boundary length increases (fragmentation)
