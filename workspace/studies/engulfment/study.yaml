schema_version: 3
name: engulfment
status: complete
phase: Decide
title: Engulfment
confidence: Accepted
question: 'Does an initially half-light/half-dark aggregate engulf to the same sorted configuration as
  the random-IC sort?

  '
hypothesis: 'Global energy minimization drives light to engulf dark independent of initial condition;
  engulfment is slow (~10^4 MCS).

  '
objective: 'Simulate the sorting energies from a top-light/bottom-dark IC to 10000 MCS and measure homotypic
  and heterotypic fractional lengths to observe engulfment.

  '
description: 'Reproduction of the Fig 18+ example from Glazier & Graner (Phys. Rev. E 47, 2128, 1993).
  Exact parameters: J_ll=14, J_dd=2, J_ld=11, J_lM=16, J_dM=16 (gamma_ld=+3, gamma_lM=+9, gamma_dM=+15);
  T=10.0, lambda=1.0, target A_l=40.0, A_d=40.0. Initial condition: half_split. Figures reproduced: Fig
  18, Fig 19.

  '
claim: Light cells engulf the dark mass and the final state matches the random-IC sort, confirming initial-condition
  independence (Figs 18-19).
investigation: glazier-graner-1993
baseline:
- name: baseline
  composite: pbg_cpm_studies.composites.gg1993.engulfment
  params: {}
expected_behavior:
- Light forms an outer layer over dark by 10000 MCS
- Light-medium fraction rises while dark-medium falls to ~0
