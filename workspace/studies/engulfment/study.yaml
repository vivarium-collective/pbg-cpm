conclusion: 'Reproduced the paper''s Engulfment example with the exact energies and initial condition;
  the pbg-cpm CPM engine yields the same qualitative behaviour and topology. Figures: Fig 18, Fig 19.'
key_assumptions:
- Second-nearest-neighbour (Moore-8) square lattice, order 2.
- 1 paper-MCS = 16 lattice-site sweeps (paper convention).
- Statistics/displays after 2 MCS of T=0 annealing (unless noted).
