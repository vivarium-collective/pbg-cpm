schema_version: 3
name: cell_sorting
status: complete
phase: Decide
title: Cell sorting
confidence: Accepted
question: 'Does differential adhesion (gamma_dM>gamma_lM>gamma_ld>0) sort a random mix into dark-inside
  / light-monolayer, as observed by Armstrong and Steinberg?

  '
hypothesis: 'Low-surface-energy dark cells coalesce internally while light cells form an outer monolayer;
  surface sorting slows logarithmically.

  '
objective: 'Simulate the sorting energies from a random IC to 13500 MCS and measure boundary lengths,
  type correlations, <n> across temperature (2-80) and lambda (0.1-10).

  '
description: 'Reproduction of the Fig 12+ example from Glazier & Graner (Phys. Rev. E 47, 2128, 1993).
  Exact parameters: J_ll=14, J_dd=2, J_ld=11, J_lM=16, J_dM=16 (gamma_ld=+3, gamma_lM=+9, gamma_dM=+15);
  T=10.0, lambda=1.0, target A_l=40.0, A_d=40.0. Initial condition: equilibrated_random. Figures reproduced:
  Fig 12, Fig 13, Fig 14, Fig 15, Fig 16, Table II, Table III.

  '
claim: 'Complete cell sorting: dark cells cluster internally beneath a light monolayer; heterotypic contact
  falls while light-medium contact rises, reproducing Figs 12-16 and Tables II-III.'
investigation: glazier-graner-1993
baseline:
- name: baseline
  composite: pbg_cpm_studies.composites.gg1993.cell_sorting
  params: {}
expected_behavior:
- Light-dark heterotypic interface decreases toward zero over the run (Fig 13c)
- Light-medium contact fraction rises while dark-medium falls (sorting/engulfment signature)
