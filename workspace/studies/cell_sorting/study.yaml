findings:
- id: F-01
  kind: computational
  status: confirms
  statement: 'Complete cell sorting: dark cells cluster internally beneath a light monolayer; heterotypic contact falls while light-medium contact rises, reproducing Figs 12-16 and Tables II-III.'
conclusion: 'Reproduced the paper''s Cell sorting example with the exact energies and initial condition; the pbg-cpm CPM engine yields the same qualitative behaviour and topology. Figures: Fig 12, Fig 13, Fig 14, Fig 15, Fig 16, Table II, Table III.'
key_assumptions:
- Second-nearest-neighbour (Moore-8) square lattice, order 2.
- 1 paper-MCS = 16 lattice-site sweeps (paper convention).
- Statistics/displays after 2 MCS of T=0 annealing (unless noted).
parent_studies:
- study: global_equilibration
  condition: tests-passed
readouts:
- name: Total boundary length
  identifier: bl_total
  units: mismatched Moore-8 bonds
  status: measured
  description: Total owner-mismatched lattice bonds — the aggregate interfacial length (paper Sec. II D 1).
- name: Fractional boundary lengths
  identifier: frac_ll, frac_dd, frac_ld, frac_lM, frac_dM
  units: fraction of total
  status: measured
  description: 'Per type-pair share of the boundary: light-light, dark-dark, light-dark, light-medium, dark-medium.'
- name: Mean number of sides
  identifier: n_bulk
  units: sides per cell
  status: measured
  description: Mean cell degree in the bulk cell-adjacency graph (the paper's number-of-sides langle n rangle).
- name: Topological moments
  identifier: mu2, mu3, mu4
  units: dimensionless
  status: measured
  description: Second/third/fourth central moments of the number-of-sides distribution (Eq. 6).
- name: Type correlations
  identifier: corr_ll, corr_dd, corr_ld, corr_lM, corr_dM
  units: fraction
  status: measured
  description: Type-type adjacency-edge and medium-contact correlations.
behavior_tests:
- name: Coarsening proceeds but sorting is logarithmically slow
  classification: primary
  description: 'Paper: Fig 12-13 — random-IC sort is very slow; only partial demixing. Pass criterion: total boundary length decreases while light-dark contact stays high (>0.35). Measured from the reproduced run: boundary 37304→36674, frac_ld∈[0.441,0.467].'
  measure: bl_total
  pass_if: total boundary length decreases while light-dark contact stays high (>0.35)
  status: passed
  result: PASS
  paper_reference: Fig 12-13 — random-IC sort is very slow; only partial demixing
