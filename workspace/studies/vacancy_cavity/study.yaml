title: Vacancy nucleation (cavity)
confidence: Accepted
question: 'With unequal target areas (A_l=20, A_d=40) and vacancy nucleation allowed, does a light-cell-lined
  central cavity form?

  '
hypothesis: 'Relaxing vacancy suppression lets medium nucleate internally, lined by light cells, forming
  a fluid-filled cavity.

  '
objective: 'Simulate the sorting energies with A_l=20/A_d=40 and allowed vacancy nucleation to observe
  cavity formation at 200 MCS.

  '
description: 'Reproduction of the Fig 28+ example from Glazier & Graner (Phys. Rev. E 47, 2128, 1993).
  Exact parameters: J_ll=14, J_dd=2, J_ld=11, J_lM=16, J_dM=16 (gamma_ld=+3, gamma_lM=+9, gamma_dM=+15);
  T=5.0, lambda=1.0, target A_l=20.0, A_d=40.0. Initial condition: equilibrated_random. Figures reproduced:
  Fig 28.

  '
claim: A light-cell-lined medium cavity nucleates within the aggregate (Fig 28); reproduced approximately
  (the paper notes this case is delicate).
investigation: glazier-graner-1993
