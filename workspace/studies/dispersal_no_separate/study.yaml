name: dispersal_no_separate
status: complete
phase: Decide
title: Dispersal - clusters do not separate
confidence: Accepted
question: 'At gamma_ld=21, do light/dark clusters stay attached (extreme partial sorting) rather than
  fully separate?

  '
hypothesis: 'Just below the separation threshold, clusters remain joined despite strong heterotypic tension.

  '
objective: 'Simulate gamma_ld=21 from a random IC and show clusters do not separate, contrasting with
  the gamma_ld=27 case.

  '
description: 'Reproduction of the Fig 27+ example from Glazier & Graner (Phys. Rev. E 47, 2128, 1993).
  Exact parameters: J_ll=14, J_dd=2, J_ld=29, J_lM=16, J_dM=16 (gamma_ld=+21, gamma_lM=+9, gamma_dM=+15);
  T=5.0, lambda=1.0, target A_l=40.0, A_d=40.0. Initial condition: equilibrated_random. Figures reproduced:
  Fig 27.

  '
claim: Clusters remain attached, an extreme partial-sorting case just below the separation threshold (Fig
  27).
investigation: glazier-graner-1993
