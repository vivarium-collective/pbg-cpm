  condition: tests-passed
readouts:
- name: Total boundary length
  identifier: bl_total
  units: mismatched Moore-8 bonds
  status: measured
  description: Total owner-mismatched lattice bonds — the aggregate interfacial length (paper Sec. II D 1).
- name: Fractional boundary lengths
  identifier: frac_ll, frac_dd, frac_ld, frac_lM, frac_dM
  units: fraction of total
  status: measured
