question: 'Does a very high heterotypic tension (gamma_ld=27) make light and dark clusters fully separate?

  '
hypothesis: 'Extreme heterotypic tension drives complete separation of light and dark clusters, with a
  few isolated dark cells.

  '
objective: 'Simulate gamma_ld=27 from a random IC and observe full light/dark cluster separation at 2000
  MCS.

  '
description: 'Reproduction of the Fig 26+ example from Glazier & Graner (Phys. Rev. E 47, 2128, 1993).
  Exact parameters: J_ll=14, J_dd=2, J_ld=35, J_lM=16, J_dM=16 (gamma_ld=+27, gamma_lM=+9, gamma_dM=+15);
  T=5.0, lambda=1.0, target A_l=40.0, A_d=40.0. Initial condition: equilibrated_random. Figures reproduced:
  Fig 26.

  '
claim: Light and dark clusters separate completely; a few isolated dark cells occur (Fig 26).
