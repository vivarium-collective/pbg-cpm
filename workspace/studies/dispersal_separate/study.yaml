  statement: Light and dark clusters separate completely; a few isolated dark cells occur (Fig 26).
conclusion: 'Reproduced the paper''s Dispersal - clusters separate example with the exact energies and initial condition; the pbg-cpm CPM engine yields the same qualitative behaviour and topology. Figures: Fig 26.'
key_assumptions:
- Second-nearest-neighbour (Moore-8) square lattice, order 2.
- 1 paper-MCS = 16 lattice-site sweeps (paper convention).
- Statistics/displays after 2 MCS of T=0 annealing (unless noted).
