schema_version: 2
name: glazier-graner-1993
title: Glazier & Graner 1993 — differential-adhesion cell rearrangement
created: '2026-07-14'
status: complete
question: 'Can a single extended-Potts (Cellular Potts) model with only differential surface energies
  and an area constraint reproduce the full range of differential-adhesion-driven cell-rearrangement phenomena
  reported by Glazier & Graner (Phys. Rev. E 47, 2128, 1993)?

  '
hypothesis: 'Varying only the type-dependent adhesion energies J(tau,tau'') and the area constraint reproduces
  checkerboard mixing, complete and partial cell sorting, engulfment, position reversal, dispersal, and
  cavity formation, with matching patterns and topological statistics.

  '
executive:
  what_is_this: A faithful, full-scale reproduction of every simulation example in Glazier & Graner 1993
    using the pbg-cpm Rust CPM engine, one study per parameter set, remaking all figures (Figs 2-5, 7-9,
    12-28; Tables I-III).
  verdict: The extended Potts model reproduces all reported phenomena from a single mechanism (differential
    adhesion + area constraint).
  verdict_status: complete
  verdict_detail: 11 studies, each with the paper's exact energies, temperature, lambda, target areas
    and initial condition; MCS scaled 16x per the paper's convention; ~1000-cell aggregates.
  decisions_needed: []
scientific_argument:
  main_claim: Differential adhesion with fluctuations, encoded as type-dependent contact energies in an
    extended Potts model, is sufficient to explain checkerboard, sorting, engulfment, reversal, dispersal
    and cavity formation.
  evidence_for:
  - 'Annealing convergence: Bulk <n> converges to ~5.97 within ~2 MCS with total<bulk, reproducing Fig
    2; cell walls compact by 2-20 MCS (Fig 3).'
  - 'Global pattern equilibration: The tiling rounds into a 1012-cell disk with <n>~6.0, mu2~0.69, matching
    Fig 4b; statistics stable after ~400 MCS (Fig 5).'
  - 'Checkerboard (negative surface tension): gamma_ld<0 yields a defect-ridden checkerboard with dominant
    light-dark contact and two transitions (~T=0 freeze, ~T=15 mixing), matching Figs 7-9 and Table I.'
  - 'Cell sorting: Complete cell sorting: dark cells cluster internally beneath a light monolayer; heterotypic
    contact falls while light-medium contact rises, reproducing Figs 12-16 and Tables II-III.'
  - 'Engulfment: Light cells engulf the dark mass and the final state matches the random-IC sort, confirming
    initial-condition independence (Figs 18-19).'
  - 'Position reversal: Dark cells sort OUTWARD, surrounding the light cells, the reversed pattern predicted
    for gamma_lM>gamma_dM (Figs 20-21).'
  - 'Partial cell sorting: Sorting stalls partial: no light monolayer forms and clusters trap inclusions,
    markedly slower than normal sorting (Figs 22-24).'
  - 'Dispersal - light-cell sloughing: Light cells disperse as isolated cells into the medium while dark
    cells remain compact and round (Fig 25).'
  - 'Dispersal - clusters separate: Light and dark clusters separate completely; a few isolated dark cells
    occur (Fig 26).'
  - 'Dispersal - clusters do not separate: Clusters remain attached, an extreme partial-sorting case just
    below the separation threshold (Fig 27).'
  - 'Vacancy nucleation (cavity): A light-cell-lined medium cavity nucleates within the aggregate (Fig
    28); reproduced approximately (the paper notes this case is delicate).'
  evidence_against: []
  key_figures:
  - cell_sorting Fig 12-13
  - checkerboard Fig 7
  - engulfment Fig 18
  - position_reversal Fig 20
  caveats:
  - Fig 28 cavity is a delicate case reproduced approximately.
  - Type-type 'correlation' panels use a cell-graph edge-fraction definition.
biological_story: 'Living tissues rearrange by differential adhesion (Steinberg''s DAH): cells of different
  types adhere with different strengths, and thermal-like membrane fluctuations let them explore configurations
  toward lower total surface energy. Glazier & Graner captured this with an extended large-Q Potts model.
  This investigation reproduces each of their examples with the pbg-cpm engine: negative heterotypic tension
  gives a checkerboard; the ordered positive tensions give complete sorting (dark inside, light monolayer)
  independent of initial condition (engulfment); raising light-medium tension reverses the layering; violating
  the Young condition stalls sorting partway; negative light-medium tension sloughs light cells into the
  medium; and unequal target areas nucleate a cavity.

  '
