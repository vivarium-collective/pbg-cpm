acceptance_criteria:
- study: annealing
  behavior: Bulk <n> reaches within 0.5% of its plateau by 2 MCS of T=0 annealing
- study: global_equilibration
  behavior: Aggregate rounds from rectangle to disk within 400 MCS
- study: checkerboard
  behavior: Light-dark heterotypic fraction is the largest cell-cell contact term
- study: cell_sorting
  behavior: Light-dark heterotypic interface decreases toward zero over the run (Fig 13c)
- study: engulfment
  behavior: Light forms an outer layer over dark by 10000 MCS
- study: position_reversal
  behavior: Dark-medium correlation rises above light-medium (outer dark layer)
- study: partial_sorting
  behavior: No complete light monolayer forms by 2000 MCS
- study: dispersal_sloughing
  behavior: Light cells detach from the aggregate into the medium
- study: dispersal_separate
  behavior: Light and dark form disjoint clusters by 2000 MCS
- study: dispersal_no_separate
  behavior: Light and dark clusters remain connected at 2000 MCS (contrast Fig 26)
- study: vacancy_cavity
  behavior: Medium pockets nucleate internally lined by light cells (approximate; delicate case)
