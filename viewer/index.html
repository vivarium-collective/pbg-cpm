<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>pbg-cpm · CPM viewer</title>
<style>
  :root {
    --bg:#0b0f14; --panel:#141a22; --panel2:#1b232e; --edge:#28323f; --fg:#e6edf3;
    --muted:#93a1b0; --dim:#6b7987; --accent:#4aa3ff; --good:#5ad17f; --bad:#ff6b6b;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--fg);
    font:13px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; overflow:hidden; }
  #app { display:grid; grid-template-columns:250px 1fr 300px; grid-template-rows:1fr auto;
    grid-template-areas:"models canvas inspector" "models transport inspector"; height:100vh; }
  /* sidebar */
  #sidebar { grid-area:models; background:var(--panel); border-right:1px solid var(--edge);
    display:flex; flex-direction:column; min-height:0; }
  #sidebar header { padding:16px 16px 12px; border-bottom:1px solid var(--edge); }
  #sidebar header h1 { margin:0; font-size:15px; letter-spacing:.3px; }
  #sidebar header .sub { color:var(--dim); font-size:11px; margin-top:2px; }
  #models { list-style:none; margin:0; padding:8px; overflow-y:auto; flex:1; }
  #models li { padding:10px 11px; border-radius:8px; cursor:pointer; border:1px solid transparent;
    margin-bottom:5px; }
  #models li:hover { background:#1d2530; }
  #models li.active { background:#17263b; border-color:var(--accent); }
  #models li .mname { font-weight:600; font-size:12.5px; }
  #models li .mmeta { color:var(--dim); font-size:11px; margin-top:2px; }
  /* canvas */
  #canvas-wrap { grid-area:canvas; position:relative; min-height:0; min-width:0; overflow:hidden; }
  canvas { display:block; }
  #loading { position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    color:var(--muted); }
  #hover-tip { position:absolute; pointer-events:none; background:rgba(11,15,20,.92);
    border:1px solid var(--edge); border-radius:7px; padding:6px 9px; font-size:11.5px;
    display:none; z-index:5; white-space:nowrap; box-shadow:0 4px 14px rgba(0,0,0,.4); }
  #hover-tip .sw { display:inline-block; width:9px; height:9px; border-radius:2px;
    margin-right:5px; vertical-align:-1px; }
  /* transport */
  #transport { grid-area:transport; background:var(--panel); border-top:1px solid var(--edge);
    display:flex; align-items:center; gap:12px; padding:10px 16px; }
  .tbtn { background:#202a36; color:var(--fg); border:1px solid var(--edge); border-radius:7px;
    padding:6px 10px; cursor:pointer; font-size:13px; min-width:34px; }
  .tbtn:hover { background:#2a3644; }
  #scrub { flex:1; accent-color:var(--accent); }
  #framelabel { color:var(--muted); font-variant-numeric:tabular-nums; font-size:11.5px;
    min-width:130px; text-align:right; }
  #transport label { color:var(--dim); font-size:11px; display:flex; align-items:center; gap:5px; }
  #speed { width:80px; accent-color:var(--accent); }
  /* inspector */
  #inspector { grid-area:inspector; background:var(--panel); border-left:1px solid var(--edge);
    overflow-y:auto; padding:16px; }
  #inspector h2 { margin:0 0 4px; font-size:14px; }
  #inspector .desc { color:var(--muted); font-size:12px; }
  #inspector .meta { color:var(--dim); font-size:11px; margin-top:6px; }
  .section { margin-top:16px; border-top:1px solid var(--edge); padding-top:12px; }
  .section h3 { margin:0 0 8px; font-size:11px; text-transform:uppercase; letter-spacing:.5px;
    color:var(--dim); font-weight:600; }
  .check { font-size:11.5px; margin-top:3px; }
  .row { display:flex; align-items:center; gap:8px; margin-bottom:7px; }
  .row label { color:var(--muted); font-size:12px; flex:0 0 auto; }
  select, .seg { background:var(--panel2); color:var(--fg); border:1px solid var(--edge);
    border-radius:6px; padding:5px 8px; font-size:12px; }
  .legend-item { display:flex; align-items:center; gap:7px; padding:4px 6px; border-radius:6px;
    cursor:pointer; font-size:12px; user-select:none; }
  .legend-item:hover { background:var(--panel2); }
  .legend-item.off { opacity:.35; }
  .legend-item .sw { width:11px; height:11px; border-radius:3px; flex:0 0 auto; }
  .legend-item .cnt { color:var(--dim); margin-left:auto; font-size:11px; }
  .stat { display:flex; justify-content:space-between; font-size:12px; margin-top:4px; }
  .stat span:last-child { color:var(--muted); font-variant-numeric:tabular-nums; }
  #spark { width:100%; height:44px; margin-top:6px; display:block; }
  .toggle { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--muted);
    cursor:pointer; margin-bottom:6px; }
  input[type=range].mini { width:100%; accent-color:var(--accent); }
</style>
<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
} }
</script>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <header><h1>pbg-cpm</h1><div class="sub">Cellular Potts · model viewer</div></header>
    <ul id="models"></ul>
  </aside>

  <div id="canvas-wrap">
    <div id="loading">loading…</div>
    <div id="hover-tip"></div>
  </div>

  <div id="transport">
    <button class="tbtn" id="first" title="first frame">⏮</button>
    <button class="tbtn" id="stepback" title="step back">◀</button>
    <button class="tbtn" id="play" title="play/pause">▶</button>
    <button class="tbtn" id="stepfwd" title="step forward">▶▶</button>
    <input id="scrub" type="range" min="0" max="0" value="0">
    <label>speed <input id="speed" type="range" min="1" max="30" value="6"></label>
    <label><input type="checkbox" id="loop" checked> loop</label>
    <span id="framelabel">—</span>
  </div>

  <aside id="inspector">
    <div id="info"><h2>Select a model</h2><div class="desc">Choose a simulation at left.</div></div>

    <div class="section" id="viz-controls">
      <h3>Visualization</h3>
      <div class="row"><label>Color by</label>
        <select id="colormode">
          <option value="type">cell type</option>
          <option value="cell">individual cell</option>
          <option value="volume">volume (2D)</option>
        </select>
      </div>
      <div id="field-controls" style="display:none">
        <div class="toggle"><input type="checkbox" id="showfield" checked> show chemical field</div>
        <label style="font-size:11px;color:var(--dim)">field opacity</label>
        <input type="range" class="mini" id="fieldop" min="0" max="100" value="100">
      </div>
    </div>

    <div class="section" id="legend-section" style="display:none">
      <h3>Cell types <span style="color:var(--dim);font-weight:400;text-transform:none">(click to toggle)</span></h3>
      <div id="legend"></div>
    </div>

    <div class="section">
      <h3>Measurements</h3>
      <div id="stats"></div>
      <canvas id="spark" width="270" height="44"></canvas>
      <div id="sparklabel" style="font-size:10.5px;color:var(--dim);text-align:center"></div>
    </div>

    <div class="section" id="valid-section" style="display:none">
      <div id="checks"></div>
    </div>
  </aside>
</div>
<script type="module" src="./viewer.js"></script>
</body>
</html>
